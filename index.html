<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>bolss games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: #171a21;
}

input {
  width: 90%;
  margin: 15px auto;
  display: block;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1b2838;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  border: 1px solid #2a475e;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

.card-content {
  padding: 15px;
}

.old-price {
  text-decoration: line-through;
  color: gray;
  display: block;
}

.price {
  color: #66c0f4;
  font-size: 18px;
  font-weight: bold;
  display: block;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  background: #66c0f4;
  cursor: pointer;
  font-weight: bold;
}

footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #171a21;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* PIX MODAL */
#pixModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1b2838;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  🎮 BOLA GAMES
  <span>🛒 <span id="cart-count">0</span></span>
</header>

<input type="text" id="search" placeholder="Buscar jogos...">

<div class="grid" id="games"></div>

<footer>
  <span id="total">Itens: 0 | Total: R$ 0.00</span>
  <button onclick="openPix()">Pagar com Pix</button>
</footer>

<!-- MODAL PIX -->
<div id="pixModal">
  <div class="modal-content">
    <h2>Pagamento via Pix</h2>
    <p>Escaneie o QR Code:</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PIX-FAKE" />
    <p>(Simulação)</p>
    <button onclick="closePix()">Fechar</button>
  </div>
</div>

<script>
const games = [
  {
    name: "GTA V",
    price: 79.9,
    img: "https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg"
  },
  {
    name: "EA Sports FC 24",
    price: 199.9,
    img: "https://cdn.cloudflare.steamstatic.com/steam/apps/2195250/header.jpg"
  },
  {
    name: "Call of Duty",
    price: 249.9,
    img: "https://cdn.cloudflare.steamstatic.com/steam/apps/1938090/header.jpg"
  },
  {
    name: "Minecraft",
    price: 99.9,
    img: "https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png"
  }
];

let cart = [];

function renderGames(list) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${game.img}">
      <div class="card-content">
        <h3>${game.name}</h3>
        <span class="old-price">R$ ${(game.price*1.3).toFixed(2)}</span>
        <span class="price">R$ ${game.price.toFixed(2)}</span>
        <button onclick='add(${JSON.stringify(game)})'>Comprar</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function add(game) {
  cart.push(game);
  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;

  const total = cart.reduce((sum, g) => sum + g.price, 0);

  document.getElementById("total").innerText =
    `Itens: ${cart.length} | Total: R$ ${total.toFixed(2)}`;
}

function openPix() {
  if(cart.length === 0){
    alert("Carrinho vazio!");
    return;
  }
  document.getElementById("pixModal").style.display = "flex";
}

function closePix() {
  document.getElementById("pixModal").style.display = "none";
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  const filtered = games.filter(g => g.name.toLowerCase().includes(val));
  renderGames(filtered);
});

renderGames(games);
</script>

</body>
</html>
